<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Messenger</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="auth-overlay">
        <div class="modern-messenger-auth glass-panel">
            <div class="logo-circle"><span style="font-size: 36px;">💬</span></div>
            <h1 id="auth-title">Messenger'a Giriş</h1>
            <p id="auth-desc" class="auth-subtitle">Arkadaşlarınla anında bağlantı kur.</p>
            <div class="modern-input-group">
                <span>👤</span><input type="text" id="auth-user" placeholder="Kullanıcı Adı" autocomplete="off">
            </div>
            <div class="modern-input-group">
                <span>🔒</span><input type="password" id="auth-pass" placeholder="Şifre" autocomplete="off">
            </div>
            <button onclick="authAction()" class="modern-auth-btn" id="auth-btn">Devam Et</button>
            <p style="margin-top:20px; font-size:14px; opacity:0.8" id="auth-toggle-text">
                Hesabın yok mu? <a href="#" onclick="toggleAuthMode()" style="color:#0072ff; font-weight:bold;">Kaydol</a>
            </p>
        </div>
    </div>

    <div class="app-layout" id="app-layout" style="display:none;">
        <aside class="sidebar glass-panel">
            <h2 style="text-align:center;">🚀 Sohbet</h2>
            <div style="margin-top:20px;">
                <input type="text" id="room-input" placeholder="Oda Adı Yaz..." style="width:90%; padding:10px; border-radius:10px; border:none; outline:none; margin-bottom:10px;">
                <button onclick="odayaKatil()" class="modern-auth-btn" style="padding:10px; margin:0;">Odaya Gir / Oluştur</button>
            </div>
            <h3 style="margin-top:20px;">🔥 Trend Odalar</h3>
            <div id="active-rooms" style="display:flex; flex-direction:column; gap:10px; margin-top:10px;"></div>
            <button onclick="location.reload()" style="margin-top:auto; background:none; border:none; color:#ff4757; cursor:pointer; font-weight:bold; font-size:16px;">🚪 Çıkış Yap</button>
        </aside>

        <main class="main-content glass-panel" id="chat-area" style="display:none;">
            <div class="chat-header">
                <div>
                    <strong id="room-title" style="font-size:18px;">Oda Seçilmedi</strong>
                    <button onclick="odaIndir()" style="background:none; border:none; cursor:pointer;" title="Sohbeti Dışa Aktar">📥 İndir</button>
                </div>
                <div>
                    <input type="text" id="search-msg" placeholder="🔍 Mesaj Ara..." onkeyup="mesajAra()" style="padding:8px 15px; border-radius:15px; border:1px solid rgba(255,255,255,0.5); background:rgba(0,0,0,0.1); color:inherit; outline:none;">
                </div>
            </div>
            
            <div id="messages"></div>
            
            <div id="typing-indicator" style="font-size:12px; margin-left:25px; font-style:italic; height:15px;"></div>
            
            <div class="input-group">
                <input type="file" id="image-upload" accept="image/*" style="display:none">
                <button class="media-btn" onclick="document.getElementById('image-upload').click()" title="Fotoğraf Gönder">🖼️</button>
                <button class="media-btn" id="mic-btn" onclick="toggleAudioRecord()" title="Sesli Mesaj Gönder">🎤</button>
                <input type="text" id="msg" placeholder="Bir mesaj yazın..." autocomplete="off" oninput="yaziyor()" onkeypress="if(event.key==='Enter') gonder()">
                <button class="send-btn" onclick="gonder()">Gönder 🚀</button>
            </div>
        </main>

        <aside class="right-sidebar glass-panel" id="right-sidebar" style="display:none;">
            <h3>👥 Odadakiler</h3>
            <p style="font-size:12px; color:gray;">Gizli DM (Özel Mesaj) başlatmak için kişiye tıklayın.</p>
            <div id="users-list" class="users-list"></div>
        </aside>
    </div>

    <div id="profile-modal" class="modal">
        <div class="modal-content glass-panel">
            <span class="close" onclick="document.getElementById('profile-modal').style.display='none'">&times;</span>
            <img id="modal-avatar" src="https://ui-avatars.com/api/?name=User" alt="Avatar">
            <h2 id="modal-username">Kullanıcı</h2>
            <p id="modal-bio" style="font-style:italic; margin-bottom:15px;">Hakkımda bilgisi yok.</p>
            <p style="font-size:12px; color:gray;">Son Görülme: <strong id="modal-lastseen">-</strong></p>
            <button onclick="baslatDM(document.getElementById('modal-username').innerText)" class="modern-auth-btn" style="padding:10px;">Özel Mesaj Gönder 🕵️</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let isim = "", oda = "";
        let isLoginMode = true; 
        let mediaRecorder, audioChunks = [], isRecording = false;

        // --- 1. GİRİŞ VE KAYIT SİSTEMİ ---
        function toggleAuthMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('auth-title').innerText = isLoginMode ? "Messenger'a Giriş" : "Hesap Oluştur";
            document.getElementById('auth-desc').innerText = isLoginMode ? "Arkadaşlarınla anında bağlantı kur." : "Saniyeler içinde aramıza katıl.";
            document.getElementById('auth-btn').innerText = isLoginMode ? "Devam Et" : "Kayıt Ol";
            document.getElementById('auth-toggle-text').innerHTML = isLoginMode ? 'Hesabın yok mu? <a href="#" onclick="toggleAuthMode()" style="color:#0072ff; font-weight:bold;">Kaydol</a>' : 'Zaten hesabın var mı? <a href="#" onclick="toggleAuthMode()" style="color:#0072ff; font-weight:bold;">Giriş Yap</a>';
        }

        function authAction() {
            const u = document.getElementById('auth-user').value.trim();
            const p = document.getElementById('auth-pass').value.trim();
            if(!u || !p) return alert("Alanları doldurun!");
            socket.emit(isLoginMode ? 'login' : 'register', {username: u, password: p});
        }

        socket.on('auth_result', (res) => {
            if(!res.success) return alert(res.msg);
            if(res.isRegister) { alert(res.msg); toggleAuthMode(); }
            else if(res.isLogin) {
                isim = res.username;
                document.getElementById('auth-overlay').style.display = 'none';
                document.getElementById('app-layout').style.display = 'flex';
                socket.emit('get_lobbies');
            }
        });

        // --- 2. ODA VE DM SİSTEMİ ---
        function odayaKatil(roomName = null) {
            const yeniOda = roomName || document.getElementById('room-input').value.trim();
            if (!yeniOda) return;
            if (oda) socket.emit('leaveRoom', oda);
            oda = yeniOda;
            socket.emit('joinRoom', oda);
            document.getElementById('chat-area').style.display = 'flex';
            document.getElementById('right-sidebar').style.display = 'flex';
            document.getElementById('room-title').innerText = `Oda: ${oda}`;
            document.getElementById('messages').innerHTML = '';
        }

        function baslatDM(hedefKullanici) {
            if(hedefKullanici === isim) return alert("Kendinize özel mesaj gönderemezsiniz.");
            // İki ismin alfabetik sırasına göre standart özel oda ismi oluştur
            const dmRoom = "DM_" + [isim, hedefKullanici].sort().join("_");
            document.getElementById('profile-modal').style.display = 'none';
            odayaKatil(dmRoom);
        }

        socket.on('update_lobbies', (rooms) => {
            const list = document.getElementById('active-rooms');
            list.innerHTML = rooms.length ? '' : '<p style="font-size:12px; text-align:center;">Aktif oda yok.</p>';
            rooms.forEach(r => list.innerHTML += `<div style="padding:10px; background:rgba(0,0,0,0.1); border-radius:10px; cursor:pointer;" onclick="odayaKatil('${r.name}')"><strong>#${r.name}</strong> (${r.count} Kişi)</div>`);
        });

        socket.on('room_users', (users) => {
            const ul = document.getElementById('users-list');
            ul.innerHTML = '';
            users.forEach(u => {
                ul.innerHTML += `<div class="user-info-card" onclick="profiliGor('${u}')">
                    <img src="https://ui-avatars.com/api/?name=${u}&background=random" style="width:30px; border-radius:50%;">
                    <span>${u} ${u === isim ? '(Sen)' : ''}</span>
                </div>`;
            });
        });

        // --- 3. MESAJLAŞMA SİSTEMİ VE AKILLI LİNKLER ---
        function gonder() {
            const input = document.getElementById('msg');
            let m = input.value.trim();
            if(m !== "") {
                socket.emit('send_message', { room: oda, user: isim, message: m });
                input.value = '';
                socket.emit('typing', { isTyping: false });
            }
        }

        function yaziyor() { socket.emit('typing', { isTyping: true }); setTimeout(()=>socket.emit('typing',{isTyping:false}),2000); }
        socket.on('user_typing', (data) => {
            document.getElementById('typing-indicator').innerText = data.isTyping ? `${data.user} yazıyor...` : "";
        });

        // AKILLI LİNK DÖNÜŞTÜRÜCÜ
        function formatMessage(text) {
            if(text.includes('<img') || text.includes('<audio')) return text; // Medyaysa dokunma
            return text.replace(/(https?:\/\/[^\s]+)/g, "<a href='$1' target='_blank'>$1</a>");
        }

        function renderMessage(data) {
            const isMine = data.user === isim;
            const formattedMsg = formatMessage(data.message);
            
            let actionsHTML = '';
            if(isMine) {
                actionsHTML = `<div class="msg-actions"><button onclick="mesajDuzenle(${data.id}, '${data.message.replace(/'/g, "\\'")}')" title="Düzenle">✏️</button><button onclick="mesajSil(${data.id})" title="Sil">🗑️</button></div>`;
            } else {
                actionsHTML = `<div class="msg-actions"><button onclick="mesajBegen(${data.id})" title="Beğen">❤️</button></div>`;
            }

            const msgHtml = `
            <div class="message ${isMine ? 'mine' : 'other'}" id="msg-${data.id}" data-text="${data.message.toLowerCase()}">
                <img src="https://ui-avatars.com/api/?name=${data.user}&background=random" class="msg-avatar" onclick="profiliGor('${data.user}')" title="Profili Gör">
                <div class="msg-content">
                    <div class="msg-header"><span>${data.user}</span><span>${data.time || ''}</span></div>
                    <div class="msg-bubble" id="bubble-${data.id}">${formattedMsg}
                        <span class="like-badge ${data.likes > 0 ? 'show' : ''}" id="like-${data.id}">❤️ ${data.likes || 0}</span>
                    </div>
                </div>
                ${actionsHTML}
            </div>`;
            document.getElementById('messages').innerHTML += msgHtml;
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        }

        socket.on('receive_message', (data) => renderMessage(data));
        socket.on('load_messages', (msgs) => { document.getElementById('messages').innerHTML=''; msgs.forEach(m => renderMessage(m)); });
        socket.on('system_message', (msg) => {
            document.getElementById('messages').innerHTML += `<div class="system-msg">${msg}</div>`;
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        });

        // --- 4. MESAJ İŞLEMLERİ (SİL, DÜZENLE, BEĞEN) ---
        function mesajSil(id) { if(confirm("Mesaj silinsin mi?")) socket.emit('delete_message', id); }
        socket.on('message_deleted', (id) => { const el = document.getElementById('msg-'+id); if(el) el.remove(); });

        function mesajDuzenle(id, oldText) {
            if(oldText.includes('<img') || oldText.includes('<audio')) return alert("Medya dosyaları düzenlenemez.");
            const newText = prompt("Mesajı düzenle:", oldText);
            if(newText && newText !== oldText) socket.emit('edit_message', {id: id, newText: newText});
        }
        socket.on('message_edited', (data) => {
            const bubble = document.getElementById('bubble-'+data.id);
            if(bubble) {
                // Sadece metni değiştir, beğeni badge'ini koru
                const badge = bubble.querySelector('.like-badge');
                bubble.innerHTML = formatMessage(data.newText) + (badge ? badge.outerHTML : '');
            }
        });

        function mesajBegen(id) { socket.emit('like_message', id); }
        socket.on('message_liked', (data) => {
            const badge = document.getElementById('like-'+data.id);
            if(badge) { badge.innerText = `❤️ ${data.likes}`; badge.classList.add('show'); }
        });

        // --- 5. ARAMA VE DIŞA AKTARMA ---
        function mesajAra() {
            const term = document.getElementById('search-msg').value.toLowerCase();
            document.querySelectorAll('.message').forEach(msg => {
                const text = msg.getAttribute('data-text');
                msg.style.display = text && text.includes(term) ? 'flex' : 'none';
            });
        }

        function odaIndir() {
            let chatText = `--- ${oda} Odası Sohbet Geçmişi ---\n\n`;
            document.querySelectorAll('.message').forEach(msg => {
                const user = msg.querySelector('.msg-header span:first-child').innerText;
                const time = msg.querySelector('.msg-header span:last-child').innerText;
                const text = msg.getAttribute('data-text'); // Saf metin
                chatText += `[${time}] ${user}: ${text}\n`;
            });
            const blob = new Blob([chatText], { type: 'text/plain' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = `${oda}_Gecmis.txt`; a.click();
        }

        // --- 6. PROFİL GÖRÜNTÜLEME ---
        function profiliGor(username) { socket.emit('get_user_profile', username); }
        socket.on('show_user_profile', (data) => {
            document.getElementById('modal-username').innerText = data.username;
            document.getElementById('modal-bio').innerText = data.bio || 'Hakkımda bilgisi yok.';
            document.getElementById('modal-lastseen').innerText = data.last_seen;
            document.getElementById('modal-avatar').src = `https://ui-avatars.com/api/?name=${data.username}&background=random&size=128`;
            document.getElementById('profile-modal').style.display = 'flex';
        });

        // --- 7. MEDYA İŞLEMLERİ (RESİM & SES) ---
        document.getElementById('image-upload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (evt) => socket.emit('send_message', { room: oda, user: isim, message: `<img src="${evt.target.result}" style="max-width:200px; border-radius:10px;">` });
                reader.readAsDataURL(file);
            }
        });

        async function toggleAudioRecord() {
            const btn = document.getElementById('mic-btn');
            if (!isRecording) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];
                    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                    mediaRecorder.onstop = () => {
                        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                        const reader = new FileReader();
                        reader.readAsDataURL(audioBlob);
                        reader.onloadend = () => socket.emit('send_message', { room: oda, user: isim, message: `<audio controls src="${reader.result}"></audio>` });
                        stream.getTracks().forEach(track => track.stop());
                    };
                    mediaRecorder.start();
                    isRecording = true;
                    btn.classList.add('recording');
                } catch(err) { alert("Mikrofon izni alınamadı!"); }
            } else {
                mediaRecorder.stop();
                isRecording = false;
                btn.classList.remove('recording');
            }
        }
    </script>
</body>
</html>
