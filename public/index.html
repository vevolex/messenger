<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Messenger Premium</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="chat-container">
        
        <div id="auth-area">
            <h2 id="auth-title">Giriş Yap 👋</h2>
            <p class="auth-subtitle" id="auth-desc">Sohbete katılmak için bilgilerinizi girin.</p>
            
            <div class="input-wrapper">
                <input type="text" id="auth-user" placeholder="Kullanıcı Adı" autocomplete="off">
            </div>
            
            <div class="input-wrapper">
                <input type="password" id="auth-pass" placeholder="Şifre" autocomplete="off">
            </div>

            <button onclick="authAction()" class="auth-btn" id="auth-btn">Giriş Yap</button>
            
            <div class="auth-footer">
                <p id="auth-toggle-text">Hesabınız yok mu? <a href="#" onclick="toggleAuthMode()">Hemen Kayıt Olun</a></p>
            </div>
        </div>

        <div id="dashboard-area" style="display:none;">
            <div class="chat-header">
                <div class="header-left">
                    <span id="welcome-title">Lobi</span>
                </div>
                <div class="header-right">
                    <button onclick="toggleTheme()" title="Gece/Gündüz Modu">🌙</button>
                    <button id="leave-btn" onclick="cikisYap()" title="Hesaptan Çıkış">🚪</button>
                </div>
            </div>
            
            <div class="dashboard-content">
                <h3>Odaya Katıl veya Oluştur</h3>
                <div class="input-group" style="border:none; padding:0; margin-bottom:20px;">
                    <input type="text" id="room-input" placeholder="Oda Adı..." autocomplete="off">
                    <button onclick="odayaKatil()">Katıl</button>
                </div>

                <h3>Aktif Odalar</h3>
                <div id="active-rooms" class="room-list">
                    </div>
            </div>
        </div>

        <div id="chat-area" style="display:none;">
            <div class="chat-header">
                <div class="header-left">
                    <span id="room-title">Oda: -</span>
                    <div style="position:relative;">
                        <span id="online-count" onclick="toggleUserList()" title="Kullanıcıları Gör">🟢 0 Çevrimiçi</span>
                        <div id="users-dropdown" class="users-dropdown" style="display:none;"></div>
                    </div>
                </div>
                <div class="header-right">
                    <button id="mute-btn" onclick="toggleMute()" title="Sesi Kapat/Aç">🔊</button>
                    <button id="export-btn" onclick="exportChat()" title="Sohbeti İndir">💾</button>
                    <button id="theme-toggle" onclick="toggleTheme()" title="Gece/Gündüz Modu">🌙</button>
                    <button id="leave-btn" onclick="lobiyeDon()" title="Lobiye Dön">⬅️</button>
                </div>
            </div>
            
            <div id="messages"></div>
            <div id="typing-indicator"></div>

            <div class="emoji-bar">
                <span onclick="emojiEkle('😀')">😀</span>
                <span onclick="emojiEkle('😂')">😂</span>
                <span onclick="emojiEkle('🔥')">🔥</span>
                <span onclick="emojiEkle('❤️')">❤️</span>
                <span onclick="emojiEkle('👍')">👍</span>
                <span onclick="emojiEkle('🚀')">🚀</span>
                <span onclick="emojiEkle('💯')">💯</span>
            </div>

            <div class="input-group">
                <input type=\"text\" id="msg" placeholder="Mesaj veya Resim URL yazın..." autocomplete="off">
                <button onclick="gonder()">Gönder</button>
            </div>
        </div>
    </div>

    <audio id="notification-sound" src="https://cdn.pixabay.com/download/audio/2021/08/04/audio_0625c1539c.mp3" preload="auto"></audio>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let isim = "";
        let oda = "";
        let typingTimeout;
        let isMuted = false;
        let isLoginMode = true;

        // --- KİMLİK DOĞRULAMA (YENİ) ---
        function toggleAuthMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('auth-title').innerText = isLoginMode ? "Giriş Yap 👋" : "Kayıt Ol 🚀";
            document.getElementById('auth-desc').innerText = isLoginMode ? "Sohbete katılmak için bilgilerinizi girin." : "Yeni bir hesap oluşturun.";
            document.getElementById('auth-btn').innerText = isLoginMode ? "Giriş Yap" : "Kayıt Ol";
            document.getElementById('auth-toggle-text').innerHTML = isLoginMode 
                ? 'Hesabınız yok mu? <a href="#" onclick="toggleAuthMode()">Hemen Kayıt Olun</a>'
                : 'Zaten hesabınız var mı? <a href="#" onclick="toggleAuthMode()">Giriş Yapın</a>';
        }

        function authAction() {
            const u = document.getElementById('auth-user').value.trim();
            const p = document.getElementById('auth-pass').value.trim();
            if(!u || !p) return alert("Kullanıcı adı ve şifre boş olamaz!");
            
            if(isLoginMode) {
                socket.emit('login', {username: u, password: p});
            } else {
                socket.emit('register', {username: u, password: p});
            }
        }

        socket.on('auth_result', (res) => {
            if(!res.success) return alert(res.msg);
            
            if(res.isRegister) {
                alert(res.msg);
                toggleAuthMode();
            } else if(res.isLogin) {
                isim = res.username;
                document.getElementById('auth-area').style.display = 'none';
                document.getElementById('dashboard-area').style.display = 'block';
                document.getElementById('welcome-title').innerText = `Lobi - 👋 ${isim}`;
                socket.emit('get_lobbies'); // Lobileri çek
            }
        });

        // --- LOBİ VE ODA İŞLEMLERİ (YENİ) ---
        function odayaKatil(odaAdi = null) {
            oda = odaAdi || document.getElementById('room-input').value.trim();
            if(!oda) return alert('Lütfen bir oda adı girin veya seçin!');
            
            socket.emit('join_room', { room: oda });
            document.getElementById('room-title').innerText = `📌 ${oda}`;
            document.getElementById('dashboard-area').style.display = 'none';
            document.getElementById('chat-area').style.display = 'flex';
        }

        function lobiyeDon() {
            socket.emit('leave_room');
            document.getElementById('chat-area').style.display = 'none';
            document.getElementById('dashboard-area').style.display = 'block';
            document.getElementById('messages').innerHTML = '';
            socket.emit('get_lobbies');
        }

        function cikisYap() {
            location.reload(); // En temiz çıkış yöntemi
        }

        socket.on('lobby_list', (rooms) => {
            const div = document.getElementById('active-rooms');
            if(rooms.length === 0) {
                div.innerHTML = '<p style="opacity:0.6; font-size:13px; text-align:center;">Henüz aktif oda yok.</p>';
                return;
            }
            div.innerHTML = rooms.map(r => `
                <div class="room-card" onclick="odayaKatil('${r.name}')">
                    <span>📁 ${r.name}</span>
                    <span class="room-count">🟢 ${r.count} Kişi</span>
                </div>
            `).join('');
        });

        // --- YARDIMCI FONKSİYONLAR ---
        function isimdenRenkUret(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                hash = str.charCodeAt(i) + ((hash << 5) - hash);
            }
            const renkler = ['#e53935', '#1e88e5', '#43a047', '#8e24aa', '#d81b60', '#f4511e', '#00acc1', '#3949ab'];
            return renkler[Math.abs(hash) % renkler.length];
        }

        function guvenliMetin(text) {
            const div = document.createElement('div');
            div.innerText = text;
            return div.innerHTML;
        }

        function formatMessage(text) {
            let safeText = guvenliMetin(text);
            const urlRegex = /(https?:\/\/[^\s]+)/g;
            return safeText.replace(urlRegex, (url) => {
                if (url.match(/\.(jpeg|jpg|gif|png|webp)$/i) != null) {
                    return `<br><img src="${url}" class="chat-img" alt="Görsel" onclick="window.open('${url}', '_blank')"><br>`;
                }
                return `<a href="${url}" target="_blank" class="chat-link">${url}</a>`;
            });
        }

        function toggleTheme() {
            document.body.classList.toggle('dark-theme');
        }

        function toggleMute() {
            isMuted = !isMuted;
            document.getElementById('mute-btn').innerText = isMuted ? "🔇" : "🔊";
        }

        function toggleUserList() {
            const dp = document.getElementById('users-dropdown');
            dp.style.display = dp.style.display === 'none' ? 'block' : 'none';
        }

        function exportChat() {
            const msgs = document.querySelectorAll('.message-wrapper');
            let txt = "SaaS Messenger - Sohbet Geçmişi\n";
            txt += `Oda: ${oda} | Tarih: ${new Date().toLocaleDateString()}\n---------------------------\n\n`;
            msgs.forEach(w => {
                const sender = w.querySelector('b') ? w.querySelector('b').innerText : 'Sistem';
                const time = w.querySelector('.time-stamp') ? w.querySelector('.time-stamp').innerText : '';
                const msg = w.querySelector('p') ? w.querySelector('p').innerText : w.innerText; 
                if(msg && w.querySelector('.time-stamp')) txt += `[${time}] ${sender}: ${msg}\n`;
            });
            const blob = new Blob([txt], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `${oda}_Sohbet.txt`; a.click(); URL.revokeObjectURL(url);
        }

        function mesajKopyala(element) {
            const p = element.querySelector('p');
            if(!p) return;
            navigator.clipboard.writeText(p.innerText).then(() => {
                const htmlYedek = p.innerHTML;
                p.innerHTML = "<b>✅ Kopyalandı!</b>";
                setTimeout(() => { p.innerHTML = htmlYedek; }, 1000);
            });
        }

        // YENİ: Mesaj Silme İşlemi
        function mesajSil(msgId) {
            if(confirm("Bu mesajı herkesden silmek istiyor musunuz?")) {
                socket.emit('delete_message', msgId);
            }
        }

        function emojiEkle(emoji) {
            const msgInput = document.getElementById('msg');
            msgInput.value += emoji;
            msgInput.focus();
        }

        function gonder() {
            const txt = document.getElementById('msg');
            if(!txt.value.trim()) return;
            socket.emit('send_message', { message: txt.value });
            txt.value = '';
            socket.emit('typing', { isTyping: false });
        }

        document.getElementById('msg').addEventListener('input', () => {
            socket.emit('typing', { isTyping: true });
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => { socket.emit('typing', { isTyping: false }); }, 1500);
        });

        document.getElementById('msg').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') gonder();
        });

        // YENİ: Avatar ve Silme İkonu entegrasyonu
        function mesajiEkranaYazdir(data) {
            const div = document.getElementById('messages');
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message-wrapper');
            msgDiv.id = `msg-${data.id}`;
            
            const userColor = isimdenRenkUret(data.user);
            const formattedMsg = formatMessage(data.message);
            const avatarLetter = data.user.charAt(0).toUpperCase();
            
            if(data.user === isim) {
                msgDiv.innerHTML = `
                    <div class="message my-message" onclick="mesajKopyala(this)" title="Kopyala">
                        <b style="color: #43a047;">Sen</b>
                        <p>${formattedMsg}</p>
                        <span class="time-stamp">${data.time}</span>
                        <span class="delete-icon" onclick="event.stopPropagation(); mesajSil(${data.id})" title="Mesajı Sil">🗑️</span>
                    </div>
                    <div class="avatar" style="background:${userColor}; margin-left:10px;">${avatarLetter}</div>`;
            } else {
                msgDiv.innerHTML = `
                    <div class="avatar" style="background:${userColor}; margin-right:10px;">${avatarLetter}</div>
                    <div class="message other-message" onclick="mesajKopyala(this)" title="Kopyala">
                        <b style="color: ${userColor};">${data.user}</b>
                        <p>${formattedMsg}</p>
                        <span class="time-stamp">${data.time}</span>
                    </div>`;
            }
            div.appendChild(msgDiv);
            div.scrollTop = div.scrollHeight;
        }

        socket.on('message_history', (rows) => {
            document.getElementById('messages').innerHTML = ''; 
            rows.forEach(row => { mesajiEkranaYazdir(row); });
        });

        socket.on('receive_message', (data) => {
            mesajiEkranaYazdir(data);
            if(data.user !== isim && !isMuted) {
                document.getElementById('notification-sound').play().catch(()=>{}).catch(e => console.log(e));
            }
        });

        // YENİ: Silinen mesajı DOM'dan kaldırma
        socket.on('message_deleted', (msgId) => {
            const el = document.getElementById(`msg-${msgId}`);
            if(el) {
                el.style.opacity = '0';
                setTimeout(() => el.remove(), 300);
            }
        });

        socket.on('room_stats', (data) => {
            document.getElementById('online-count').innerText = `🟢 ${data.count} Çevrimiçi`;
            const dropdown = document.getElementById('users-dropdown');
            dropdown.innerHTML = (data.users && data.users.length > 0) 
                ? data.users.map(u => `<div>👤 ${u}</div>`).join('') 
                : `<div>Kimse yok</div>`;
        });

        socket.on('system_message', (msg) => {
            const div = document.getElementById('messages');
            div.innerHTML += `<div class="system-message">${msg}</div>`;
            div.scrollTop = div.scrollHeight;
        });

        socket.on('user_typing', (data) => {
            document.getElementById('typing-indicator').innerText = data.isTyping ? `✍️ ${data.user} yazıyor...` : '';
        });
    </script>
</body>
</html>
