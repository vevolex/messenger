<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Messenger Premium</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="chat-container">
        <div id="login-area">
            <h2>Hoş Geldiniz 👋</h2>
            <p class="auth-subtitle">Sohbete katılmak için bilgilerinizi girin.</p>
            
            <div class="input-wrapper">
                <input type="text" id="user" placeholder="Kullanıcı Adınız" autocomplete="off">
            </div>
            
            <div class="input-wrapper">
                <input type="text" id="room" placeholder="Oda Adı (Örn: teknoloji)" autocomplete="off">
            </div>

            <button onclick="baglan()" class="auth-btn">Sohbete Başla</button>
        </div>

        <div id="chat-area" style="display:none;">
            <div class="chat-header">
                <div class="header-left">
                    <span id="room-title">Oda: -</span>
                    <div style="position:relative;">
                        <span id="online-count" onclick="toggleUserList()" title="Kullanıcıları Gör">🟢 0 Çevrimiçi</span>
                        <div id="users-dropdown" class="users-dropdown" style="display:none;"></div>
                    </div>
                </div>
                <div class="header-right">
                    <button id="mute-btn" onclick="toggleMute()" title="Sesi Kapat/Aç">🔊</button>
                    <button id="export-btn" onclick="exportChat()" title="Sohbeti İndir">💾</button>
                    <button id="theme-toggle" onclick="toggleTheme()" title="Gece/Gündüz Modu">🌙</button>
                    <button id="leave-btn" onclick="cikisYap()" title="Odadan Çık">🚪</button>
                    <span id="user-title">👤 -</span>
                </div>
            </div>
            
            <div id="messages"></div>
            <div id="typing-indicator"></div>

            <div class="emoji-bar">
                <span onclick="emojiEkle('😀')">😀</span>
                <span onclick="emojiEkle('😂')">😂</span>
                <span onclick="emojiEkle('🔥')">🔥</span>
                <span onclick="emojiEkle('❤️')">❤️</span>
                <span onclick="emojiEkle('👍')">👍</span>
                <span onclick="emojiEkle('🚀')">🚀</span>
                <span onclick="emojiEkle('💯')">💯</span>
            </div>

            <div class="input-group">
                <input type="text" id="msg" placeholder="Mesaj veya Resim URL yazın..." autocomplete="off">
                <button onclick="gonder()">Gönder</button>
            </div>
        </div>
    </div>

    <audio id="notification-sound" src="https://cdn.pixabay.com/download/audio/2021/08/04/audio_0625c1539c.mp3" preload="auto"></audio>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let isim, oda;
        let typingTimeout;
        let isMuted = false;

        function isimdenRenkUret(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                hash = str.charCodeAt(i) + ((hash << 5) - hash);
            }
            const renkler = ['#e53935', '#1e88e5', '#43a047', '#8e24aa', '#d81b60', '#f4511e', '#00acc1', '#3949ab'];
            return renkler[Math.abs(hash) % renkler.length];
        }

        function guvenliMetin(text) {
            const div = document.createElement('div');
            div.innerText = text;
            return div.innerHTML;
        }

        function formatMessage(text) {
            let safeText = guvenliMetin(text);
            const urlRegex = /(https?:\/\/[^\s]+)/g;
            return safeText.replace(urlRegex, (url) => {
                if (url.match(/\.(jpeg|jpg|gif|png|webp)$/i) != null) {
                    return `<br><img src="${url}" class="chat-img" alt="Görsel" onclick="window.open('${url}', '_blank')"><br>`;
                }
                return `<a href="${url}" target="_blank" class="chat-link">${url}</a>`;
            });
        }

        function toggleTheme() {
            document.body.classList.toggle('dark-theme');
            const btn = document.getElementById('theme-toggle');
            btn.innerText = document.body.classList.contains('dark-theme') ? "☀️" : "🌙";
        }

        // YENİ: Sesi Aç/Kapat
        function toggleMute() {
            isMuted = !isMuted;
            document.getElementById('mute-btn').innerText = isMuted ? "🔇" : "🔊";
        }

        // YENİ: Kullanıcı Listesini Göster/Gizle
        function toggleUserList() {
            const dp = document.getElementById('users-dropdown');
            dp.style.display = dp.style.display === 'none' ? 'block' : 'none';
        }

        // YENİ: Sohbeti İndir
        function exportChat() {
            const msgs = document.querySelectorAll('.message-wrapper');
            let txt = "SaaS Messenger - Sohbet Geçmişi\n";
            txt += `Oda: ${oda} | Tarih: ${new Date().toLocaleDateString()}\n`;
            txt += "--------------------------------------\n\n";
            
            msgs.forEach(w => {
                const sender = w.querySelector('b') ? w.querySelector('b').innerText : 'Sistem';
                const time = w.querySelector('.time-stamp') ? w.querySelector('.time-stamp').innerText : '';
                const msg = w.querySelector('p') ? w.querySelector('p').innerText : w.innerText; // Sistem mesajı kontrolü
                if(msg && w.querySelector('.time-stamp')) txt += `[${time}] ${sender}: ${msg}\n`;
            });

            const blob = new Blob([txt], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${oda}_Sohbet.txt`;
            a.click();
            URL.revokeObjectURL(url);
        }

        // YENİ: Mesaja Tıklayarak Kopyalama
        function mesajKopyala(element) {
            const p = element.querySelector('p');
            if(!p) return;
            const gercekMetin = p.innerText;
            const htmlYedek = p.innerHTML;

            navigator.clipboard.writeText(gercekMetin).then(() => {
                p.innerHTML = "<b>✅ Kopyalandı!</b>";
                setTimeout(() => { p.innerHTML = htmlYedek; }, 1200);
            });
        }

        function baglan() {
            isim = document.getElementById('user').value.trim();
            oda = document.getElementById('room').value.trim();
            if(!isim || !oda) return alert('Lütfen alanları doldurun!');
            
            socket.emit('join_room', { room: oda, user: isim });
            document.getElementById('room-title').innerText = `📌 ${oda}`;
            document.getElementById('user-title').innerText = `👤 ${isim}`;
            document.getElementById('login-area').style.display = 'none';
            document.getElementById('chat-area').style.display = 'flex';
        }

        function cikisYap() {
            socket.emit('leave_room');
            document.getElementById('chat-area').style.display = 'none';
            document.getElementById('login-area').style.display = 'flex';
            document.getElementById('messages').innerHTML = '';
            document.getElementById('msg').value = '';
            document.getElementById('users-dropdown').style.display = 'none';
        }

        function emojiEkle(emoji) {
            const msgInput = document.getElementById('msg');
            msgInput.value += emoji;
            msgInput.focus();
        }

        function gonder() {
            const txt = document.getElementById('msg');
            if(!txt.value.trim()) return;
            socket.emit('send_message', { room: oda, user: isim, message: txt.value });
            txt.value = '';
            socket.emit('typing', { room: oda, user: isim, isTyping: false });
        }

        document.getElementById('msg').addEventListener('input', () => {
            socket.emit('typing', { room: oda, user: isim, isTyping: true });
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => {
                socket.emit('typing', { room: oda, user: isim, isTyping: false });
            }, 1500);
        });

        document.getElementById('msg').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') gonder();
        });

        function mesajiEkranaYazdir(data) {
            const div = document.getElementById('messages');
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message-wrapper');
            
            const userColor = isimdenRenkUret(data.user);
            const formattedMsg = formatMessage(data.message);
            
            if(data.user === isim) {
                // Kopyalama eventi eklendi
                msgDiv.innerHTML = `
                    <div class="message my-message" onclick="mesajKopyala(this)" title="Kopyalamak için tıklayın">
                        <b style="color: #43a047;">Sen</b>
                        <p>${formattedMsg}</p>
                        <span class="time-stamp">${data.time}</span>
                    </div>`;
            } else {
                msgDiv.innerHTML = `
                    <div class="message other-message" onclick="mesajKopyala(this)" title="Kopyalamak için tıklayın">
                        <b style="color: ${userColor};">${data.user}</b>
                        <p>${formattedMsg}</p>
                        <span class="time-stamp">${data.time}</span>
                    </div>`;
            }
            div.appendChild(msgDiv);
            div.scrollTop = div.scrollHeight;
        }

        socket.on('message_history', (rows) => {
            document.getElementById('messages').innerHTML = ''; 
            rows.forEach(row => {
                mesajiEkranaYazdir(row);
            });
        });

        socket.on('receive_message', (data) => {
            mesajiEkranaYazdir(data);
            
            // Sessizde değilse ses çal
            if(data.user !== isim && !isMuted) {
                const sound = document.getElementById('notification-sound');
                sound.play().catch(e => console.log("Otomatik ses çalma engellendi."));
            }
        });

        socket.on('room_stats', (data) => {
            document.getElementById('online-count').innerText = `🟢 ${data.count} Çevrimiçi`;
            
            // Kullanıcı listesi dropdown'ını güncelle
            const dropdown = document.getElementById('users-dropdown');
            if(data.users && data.users.length > 0) {
                dropdown.innerHTML = data.users.map(u => `<div>👤 ${u}</div>`).join('');
            } else {
                dropdown.innerHTML = `<div>Kimse yok</div>`;
            }
        });

        socket.on('system_message', (msg) => {
            const div = document.getElementById('messages');
            div.innerHTML += `<div class="system-message">${msg}</div>`;
            div.scrollTop = div.scrollHeight;
        });

        socket.on('user_typing', (data) => {
            const indicator = document.getElementById('typing-indicator');
            indicator.innerText = data.isTyping ? `✍️ ${data.user} yazıyor...` : '';
        });
    </script>
</body>
</html>
